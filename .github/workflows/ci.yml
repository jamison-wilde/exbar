name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  doc-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: "-D warnings"

  build-msi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, doc-check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p exbar-cli
      - run: dotnet tool install --global wix
      - run: wix extension add --global WixToolset.Util.wixext WixToolset.UI.wixext
      - name: Accept WiX EULA
        run: wix eula accept wix7
      - name: Build MSI
        run: bash ./scripts/build-msi.sh
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: exbar-msi
          path: target/wix/exbar-*.msi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/wix/exbar-*.msi
          generate_release_notes: true
